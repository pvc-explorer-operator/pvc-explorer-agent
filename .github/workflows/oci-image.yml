name: OCI Image

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - Dockerfile
      - go.mod
      - go.sum
      - embedui.go
      - cmd/**
      - agent/**
      - internal/**
      - ui/**
      - .github/workflows/oci-image.yml
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: oci-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release-on-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Create GitHub Release for version tags
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          title="Release ${tag}"

          if [[ "${tag}" == *-* ]]; then
            gh release create "${tag}" --title "${title}" --notes "" --prerelease --target ${{ github.sha }} || \
            gh release edit "${tag}" --title "${title}" --notes "" --prerelease --latest=false --target ${{ github.sha }}
          else
            gh release create "${tag}" --title "${title}" --notes "" --latest --target ${{ github.sha }} || \
            gh release edit "${tag}" --title "${title}" --notes "" --latest --target ${{ github.sha }}
          fi

  publish-dev:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=dev-
          labels: |
            org.opencontainers.image.title=pvc-explorer-agent
            org.opencontainers.image.description=Lightweight HTTP file-browser agent for browsing PersistentVolumeClaim contents over a simple REST API.
            org.opencontainers.image.vendor=pvc-explorer-operator
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Build and push dev image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate dev SBOM file
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: |
          docker run --rm -v "$PWD:/work" -w /work anchore/syft:latest "$IMAGE_REF" -o spdx-json=sbom-dev-${{ github.sha }}.spdx.json

      - name: Prune old dev OCI images
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
          CURRENT_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -o pipefail

          mapfile -t stale_versions < <(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=100" \
              --paginate \
              --jq '.[]
                | select(.name != env.CURRENT_DIGEST)
                | select(
                    ((.metadata.container.tags // []) | map(startswith("dev-")) | any)
                    or ((.metadata.container.tags // []) | map(test("\\.(sig|sbom)$")) | any)
                    or (((.metadata.container.tags // []) | length) == 0)
                  )
                | [.id, .name, ((.metadata.container.tags // []) | join(","))]
                | @tsv'
          )

          echo "Found ${#stale_versions[@]} stale OCI package version(s)"
          deleted=0
          for version in "${stale_versions[@]}"; do
            [ -z "$version" ] && continue
            version_id="${version%%$'\t'*}"
            rest="${version#*$'\t'}"
            version_name="${rest%%$'\t'*}"
            version_tags="${rest#*$'\t'}"
            [ "$version_tags" = "$rest" ] && version_tags="<none>"
            echo "Deleting package version ID ${version_id} (name=${version_name}, tags=${version_tags})"
            gh api --method DELETE "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions/${version_id}" >/dev/null
            deleted=$((deleted + 1))
          done
          echo "Deleted ${deleted} stale OCI package version(s)"

      - name: Sign dev image
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Attach dev SBOM to image with cosign
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attach sbom --sbom sbom-dev-${{ github.sha }}.spdx.json "$IMAGE_REF"

      - name: Add dev SBOM summary
        run: |
          {
            echo "### OCI Image Output"
            echo ""
            echo "- Image digest: \`ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}\`"
            echo "- Download SBOM: \`cosign download sbom ghcr.io/${{ github.repository }}:dev\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=pvc-explorer-agent
            org.opencontainers.image.description=Lightweight HTTP file-browser agent for browsing PersistentVolumeClaim contents over a simple REST API.
            org.opencontainers.image.vendor=pvc-explorer-operator
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign release image
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Generate release SBOM file
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: |
          docker run --rm -v "$PWD:/work" -w /work anchore/syft:latest "$IMAGE_REF" -o spdx-json=sbom-${{ github.ref_name }}.spdx.json

      - name: Upload release SBOM workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom-${{ github.ref_name }}.spdx.json
          if-no-files-found: error

      - name: Attach release SBOM to image with cosign
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attach sbom --sbom sbom-${{ github.ref_name }}.spdx.json "$IMAGE_REF"

      - name: Attach SBOM to GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" "sbom-${{ github.ref_name }}.spdx.json" --clobber

      - name: Add release SBOM summary
        run: |
          {
            echo "### OCI Image Output"
            echo ""
            echo "- Image digest: \`ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}\`"
            echo "- Download SBOM: \`cosign download sbom ghcr.io/${{ github.repository }}:${{ github.ref_name }}\`"
            echo "- Release asset: \`sbom-${{ github.ref_name }}.spdx.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          previous_tag="$({
            gh api "/repos/${REPO}/releases?per_page=100" \
              --jq '[.[] | select(.draft == false and .prerelease == false and .tag_name != env.TAG)][0].tag_name'
          } || true)"

          {
            echo "oci image: [ghcr.io/${REPO}:${TAG}](https://github.com/${REPO}/pkgs/container/${PACKAGE_NAME})"
            echo "sbom: [sbom-${TAG}.spdx.json](https://github.com/${REPO}/releases/download/${TAG}/sbom-${TAG}.spdx.json)"
            echo ""
            echo "Changes:"
            echo "(Generated changes since last non dev release)"
            echo ""

            if [ -n "${previous_tag}" ] && [ "${previous_tag}" != "null" ]; then
              gh api "/repos/${REPO}/compare/${previous_tag}...${TAG}" \
                --jq '.commits[] | "- " + (.commit.message | split("\n")[0])'
            else
              echo "- Initial release"
            fi
          } > release-notes.md

          gh release edit "${TAG}" --notes-file release-notes.md
