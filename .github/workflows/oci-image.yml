name: OCI Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - go.mod
      - go.sum
      - embedui.go
      - cmd/**
      - agent/**
      - internal/**
      - ui/**
      - .github/workflows/oci-image.yml
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: oci-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-dev:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=dev-
          labels: |
            org.opencontainers.image.title=pvc-explorer-agent
            org.opencontainers.image.description=Lightweight HTTP file-browser agent for browsing PersistentVolumeClaim contents over a simple REST API.
            org.opencontainers.image.vendor=pvc-explorer-operator
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build and push dev image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign dev image
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Generate dev SBOM file
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: |
          docker run --rm -v "$PWD:/work" -w /work anchore/syft:latest "$IMAGE_REF" -o spdx-json=sbom-dev-${{ github.sha }}.spdx.json

      - name: Upload dev SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-dev-${{ github.sha }}
          path: sbom-dev-${{ github.sha }}.spdx.json
          if-no-files-found: error

      - name: Add dev SBOM summary
        run: |
          {
            echo "### OCI Image Output"
            echo ""
            echo "- Image digest: \`ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}\`"
            echo "- SBOM artifact: \`sbom-dev-${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}
          labels: |
            org.opencontainers.image.title=pvc-explorer-agent
            org.opencontainers.image.description=Lightweight HTTP file-browser agent for browsing PersistentVolumeClaim contents over a simple REST API.
            org.opencontainers.image.vendor=pvc-explorer-operator
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign release image
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Generate release SBOM file
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: |
          docker run --rm -v "$PWD:/work" -w /work anchore/syft:latest "$IMAGE_REF" -o spdx-json=sbom-${{ github.event.release.tag_name }}.spdx.json

      - name: Upload release SBOM workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.event.release.tag_name }}
          path: sbom-${{ github.event.release.tag_name }}.spdx.json
          if-no-files-found: error

      - name: Attach SBOM to GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: sbom-${{ github.event.release.tag_name }}.spdx.json

      - name: Add release SBOM summary
        run: |
          {
            echo "### OCI Image Output"
            echo ""
            echo "- Image digest: \`ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}\`"
            echo "- Release asset: \`sbom-${{ github.event.release.tag_name }}.spdx.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
