version: 2
updates:
  # Enable version updates for Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "pvc-explorer-operator/maintainers"
    labels:
      - "dependencies"
      - "go"
    allow:
      - dependency-type: "all"

  # Enable version updates for Docker base images
  # Docker images are pinned by SHA digest for immutability and security.
  # Dependabot updates both the tag and digest together when a newer version is available.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
    open-pull-requests-limit: 5
    reviewers:
      - "pvc-explorer-operator/maintainers"
    labels:
      - "dependencies"
      - "docker"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    reviewers:
      - "pvc-explorer-operator/maintainers"
    labels:
      - "dependencies"
      - "github-actions"
