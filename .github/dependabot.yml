version: 2
updates:
  # Enable version updates for Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "pvc-explorer-operator/maintainers"
    labels:
      - "dependencies"
      - "go"
    allow:
      - dependency-type: "all"

  # Enable version updates for Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
    open-pull-requests-limit: 5
    reviewers:
      - "pvc-explorer-operator/maintainers"
    labels:
      - "dependencies"
      - "docker"
