# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  go: "1.26"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive
    - bodyclose
    - noctx
    - prealloc
  disable:
    - exhaustruct
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    gosec:
      excludes:
        - G115 # integer overflow conversions (false positives in Go 1.26)
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
    staticcheck:
      checks:
        - all
        - '-SA1019' # allow deprecated identifiers
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - bodyclose
      - path: cmd/agent/main\.go
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
